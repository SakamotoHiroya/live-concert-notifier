services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: live_concert_notifier
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://app:app@db:5432/live_concert_notifier?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  db_data:
